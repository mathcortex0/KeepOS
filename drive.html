<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KeepOS — University Admission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
:root{
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --accent:#00d4aa;--accent-h:#00b894;
  --gs:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
  --hh:64px;--r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body{font-family:var(--gs);background:var(--bg);color:var(--t2);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surf);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-wrap img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-wrap span{font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--t1)}
.main{flex:1;padding-top:var(--hh)}
.content{max-width:640px;margin:0 auto;padding:40px 24px;text-align:center}
.file-icon{width:80px;height:80px;background:#e6f4ea;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.file-icon svg{width:40px;height:40px;color:#1e8e3e}
.page-title{font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--t1);margin-bottom:8px}
.page-subtitle{font-size:.95rem;color:var(--t3);margin-bottom:8px}
.file-meta{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:32px;font-size:.82rem;color:var(--t4);flex-wrap:wrap}
.file-meta span{display:flex;align-items:center;gap:4px}
.file-meta svg{width:14px;height:14px}
.btn-download{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:var(--accent);color:#fff;font-family:var(--gs);font-size:1rem;font-weight:600;border:none;border-radius:var(--rl);cursor:pointer;text-decoration:none;transition:all var(--tr);box-shadow:0 1px 3px rgba(0,212,170,.3),0 4px 12px rgba(0,212,170,.2)}
.btn-download:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 4px 8px rgba(0,180,140,.3),0 8px 20px rgba(0,180,140,.2)}
.btn-download svg{width:20px;height:20px}
.drive-link{margin-top:20px;font-size:.8rem;color:var(--t4)}
.drive-link a{color:var(--accent);text-decoration:none;word-break:break-all}
.drive-link a:hover{text-decoration:underline}
.footer{background:var(--surf);border-top:1px solid var(--border);margin-top:auto}
.footer-inner{max-width:640px;margin:0 auto;padding:24px 24px;display:flex;justify-content:space-between;align-items:center}
.footer-brand{display:flex;align-items:center;gap:8px}
.footer-bottom{max-width:640px;margin:0 auto;padding:12px 24px;border-top:1px solid var(--border);font-size:.7rem;color:var(--t4);text-align:center;padding-bottom:calc(12px + var(--safe-bottom))}
@media(max-width:600px){.header{padding:0 12px}.content{padding:32px 20px}.btn-download{width:100%;justify-content:center}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="/" class="logo-wrap">
      <img src="/images/keepos.png" alt="KeepOS" height="32" onerror="this.style.display='none'">
      <span>KeepOS</span>
    </a>
  </div>
</header>

<main class="main">
  <div class="content">
    <div class="file-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    
    <h1 class="page-title">University Admission</h1>
    <p class="page-subtitle">Important documents for university admission</p>
    
    <div class="file-meta">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> PDF Document</span>
    </div>

    <a href="https://drive.google.com/uc?export=download&id=1mPcWDZJs3S8fcHjsQnRspYbXuimWz5iM" class="btn-download" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download File
    </a>

    <div class="drive-link">
      <a href="https://drive.google.com/file/d/1mPcWDZJs3S8fcHjsQnRspYbXuimWz5iM/view" target="_blank" rel="noopener">Open in Google Drive</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand"><img src="/images/keepos.png" alt="KeepOS" height="20" style="border-radius:50%" onerror="this.style.display='none'"><span style="font-family:var(--serif);font-size:.9rem;font-weight:600;color:var(--t2)">KeepOS</span></div>
  </div>
  <div class="footer-bottom">&copy; 2025 KeepOS</div>
</footer>

</body>
</html>
