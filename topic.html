<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KeepOS — Topic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
:root{
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --accent:#00d4aa;--accent-h:#00b894;--red:#d93025;--red-bg:#fce8e6;
  --green:#1e8e3e;--grn-bg:#e6f4ea;--yel:#f9ab00;--yel-bg:#fef7e0;
  --gs:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
  --hh:64px;--r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body{font-family:var(--gs);background:var(--bg);color:var(--t2);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surf);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-left{display:flex;align-items:center;gap:12px}
.hamburger{width:44px;height:44px;border:none;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:background var(--tr);flex-shrink:0}
.hamburger:hover{background:var(--hov)}
.hamburger svg{width:22px;height:22px}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-wrap img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-wrap span{font-family:var(--serif);font-size:1.25rem;font-weight:600;color:var(--t1)}
.header-center{flex:1;max-width:480px;margin:0 16px;position:relative}
.search-wrap{position:relative}
.search-input{width:100%;padding:10px 14px 10px 44px;border:1px solid var(--border);border-radius:100px;font-family:var(--gs);font-size:.9rem;color:var(--t1);background:var(--hov);outline:none;transition:all var(--tr);min-height:44px}
.search-input:focus{background:var(--surf);border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,.15)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t4);pointer-events:none}
.search-icon svg{width:18px;height:18px}
.search-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:360px;overflow-y:auto;display:none;z-index:100}
.search-dropdown.open{display:block}
.search-dropdown .section-label{padding:10px 16px 4px;font-size:.7rem;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.search-dropdown .result-item{display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:var(--t2);font-size:.85rem;transition:background var(--tr);cursor:pointer}
.search-dropdown .result-item:hover{background:var(--hov)}
.header-right{display:flex;align-items:center;gap:6px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--gs);font-weight:600;font-size:14px;color:#fff;cursor:pointer;flex-shrink:0;border:2px solid transparent;position:relative}
.avatar:hover{border-color:var(--border)}
.avatar-menu{position:absolute;top:100%;right:0;margin-top:8px;background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:180px;display:none;z-index:200}
.avatar-menu.open{display:block}
.avatar-menu a,.avatar-menu button{display:flex;align-items:center;gap:10px;padding:12px 18px;width:100%;text-decoration:none;color:var(--t2);font-family:var(--gs);font-size:.85rem;background:none;border:none;cursor:pointer;text-align:left;transition:background var(--tr)}
.avatar-menu a:hover,.avatar-menu button:hover{background:var(--hov)}
.avatar-menu a svg,.avatar-menu button svg{width:16px;height:16px;flex-shrink:0}
.avatar-menu .divider{border-top:1px solid var(--border);margin:4px 0}
.sidebar{position:fixed;top:var(--hh);left:0;bottom:0;width:260px;background:var(--surf);border-right:1px solid var(--border);z-index:900;transform:translateX(-100%);transition:transform var(--tr);overflow-y:auto;padding:16px 0}
.sidebar.open{transform:translateX(0)}
.sidebar-backdrop{position:fixed;inset:0;top:var(--hh);background:rgba(0,0,0,.35);z-index:899;display:none}
.sidebar-backdrop.open{display:block}
.sidebar-section{padding:0 16px;margin-bottom:8px}
.sidebar-label{font-size:.7rem;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;padding:8px 0}
.sidebar-subject{display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:var(--t2);font-size:.85rem;border-radius:var(--r);transition:background var(--tr);cursor:pointer}
.sidebar-subject:hover{background:var(--hov)}
.sidebar-subject .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;padding-top:var(--hh);padding-left:0;transition:padding var(--tr)}
.main.shifted{padding-left:260px}
.content{max-width:1080px;margin:0 auto;padding:32px 24px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--t4);margin-bottom:8px;flex-wrap:wrap}
.breadcrumb a{color:var(--accent);text-decoration:none;font-weight:500}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb svg{width:14px;height:14px;flex-shrink:0}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--t1)}
.page-actions{display:flex;gap:8px}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-family:var(--gs);font-size:.85rem;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);min-height:40px;text-decoration:none}
.btn-sm-primary{background:var(--accent);color:#fff}
.btn-sm-primary:hover{background:var(--accent-h)}
.btn-sm-outline{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-sm-outline:hover{background:var(--hov)}
.btn-sm-danger{background:transparent;color:var(--red)}
.btn-sm-danger:hover{background:var(--red-bg)}

/* NOTE CARDS */
.note-feed{display:flex;flex-direction:column;gap:14px}
.note-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;transition:all var(--tr);position:relative;cursor:pointer}
.note-card:hover{box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15)}
.note-card .note-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.note-card .note-title{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--t1)}
.note-card .note-type-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:100px;background:var(--hov);color:var(--t4);font-family:var(--mono)}
.note-card .note-type-badge.type-text{background:var(--grn-bg);color:var(--green)}
.note-card .note-type-badge.type-image{background:#e8f0fe;color:#1a73e8}
.note-card .note-type-badge.type-link{background:var(--yel-bg);color:#e37400}
.note-card .note-type-badge.type-mixed{background:#f3e8fd;color:#9333ea}
.note-card .note-body{font-size:.9rem;color:var(--t2);line-height:1.7;max-height:80px;overflow:hidden;transition:max-height .3s ease}
.note-card.expanded .note-body{max-height:none;overflow:visible}
.note-card .note-body img{max-width:100%;border-radius:var(--r);margin:8px 0}
.note-card .note-body a{color:var(--accent);text-decoration:underline}
.note-card .note-body blockquote{border-left:3px solid var(--accent);padding-left:14px;margin:10px 0;color:var(--t3);font-style:italic}
.note-card .note-body pre{background:var(--hov);padding:12px;border-radius:var(--r);overflow-x:auto;font-family:var(--mono);font-size:.8rem}
.note-card .note-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:.82rem}
.note-card .note-body table td,.note-card .note-body table th{border:1px solid var(--border);padding:8px 12px}
.note-card .note-body ul,.note-card .note-body ol{padding-left:20px;margin:8px 0}
.note-card .read-more{font-size:.78rem;color:var(--accent);cursor:pointer;font-weight:600;margin-top:8px;display:inline-block}
.note-card.expanded .read-more{display:none}
.note-card .note-actions{display:flex;gap:4px;position:absolute;top:16px;right:16px;opacity:0;transition:opacity var(--tr)}
.note-card:hover .note-actions,.note-card.expanded .note-actions{opacity:1}
.icon-btn-sm{width:32px;height:32px;border:none;background:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);transition:background var(--tr)}
.icon-btn-sm:hover{background:var(--hov)}
.icon-btn-sm svg{width:15px;height:15px}
.empty-state{text-align:center;padding:60px 20px}
.empty-state svg{width:80px;height:80px;color:var(--t4);margin-bottom:16px}
.empty-state h3{font-family:var(--serif);font-size:1.3rem;color:var(--t1);margin-bottom:6px}
.empty-state p{font-size:.9rem;color:var(--t3);margin-bottom:20px}
.skeleton-card{height:100px;background:linear-gradient(90deg,var(--hov) 25%,#e8eaed 50%,var(--hov) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--rl)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EDITOR */
.editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:none;flex-direction:column}
.editor-overlay.open{display:flex}
.editor-header{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.editor-header h3{font-family:var(--serif);font-size:1.2rem;font-weight:600;color:var(--t1)}
.editor-header .close-btn{width:40px;height:40px;border:none;background:none;border-radius:50%;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:background var(--tr)}
.editor-header .close-btn:hover{background:var(--hov)}
.editor-body{flex:1;overflow-y:auto;padding:20px}
.editor-container{max-width:900px;margin:0 auto;background:var(--surf);border:1px solid var(--border);border-radius:var(--rl)}
.editor-meta{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.editor-meta input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--gs);font-size:1rem;color:var(--t1);outline:none}
.editor-meta input:focus{border:2px solid var(--accent);padding:9px 13px}
.editor-meta .type-row{display:flex;gap:6px;flex-wrap:wrap}
.type-chip{padding:6px 14px;border-radius:100px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t3);transition:all var(--tr);font-family:var(--gs)}
.type-chip:hover{background:var(--hov)}
.type-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.editor-toolbar{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--hov)}
.tb-btn{width:36px;height:36px;border:none;background:none;border-radius:var(--r);cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all var(--tr);font-family:var(--gs);font-weight:600}
.tb-btn:hover{background:var(--surf);color:var(--t1)}
.tb-btn svg{width:16px;height:16px}
.tb-btn.active-btn{background:var(--accent);color:#fff}
.tb-sep{width:1px;height:24px;background:var(--border);margin:6px 4px}
.editor-area{padding:20px;min-height:300px;outline:none;font-family:var(--gs);font-size:.95rem;color:var(--t1);line-height:1.8}
.editor-area:empty:before{content:'Start writing...';color:var(--t4)}
.editor-area h2{font-family:var(--serif);font-size:1.4rem;margin:16px 0 8px;color:var(--t1)}
.editor-area h3{font-family:var(--serif);font-size:1.15rem;margin:12px 0 6px;color:var(--t1)}
.editor-area img{max-width:100%;border-radius:var(--r);margin:8px 0}
.editor-area blockquote{border-left:3px solid var(--accent);padding-left:14px;margin:10px 0;color:var(--t3)}
.editor-area pre{background:var(--hov);padding:12px;border-radius:var(--r);overflow-x:auto;font-family:var(--mono);font-size:.8rem}
.editor-area table{border-collapse:collapse;width:100%;margin:10px 0}
.editor-area table td,.editor-area table th{border:1px solid var(--border);padding:6px 10px;min-width:60px}
.html-source-area{display:none;width:100%;min-height:300px;padding:20px;font-family:var(--mono);font-size:.82rem;color:var(--t1);line-height:1.6;border:none;outline:none;resize:vertical;background:var(--hov)}
.html-source-area.show{display:block}
.editor-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.editor-footer .btn-sm{min-height:40px}
.spinner-inline{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.note-link-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--hov);border-radius:var(--r);margin:8px 0}
.note-link-card svg{width:20px;height:20px;flex-shrink:0;color:var(--t4)}
.note-link-card a{color:var(--accent);text-decoration:none;font-weight:500;word-break:break-all}
.note-link-card a:hover{text-decoration:underline}

.footer{background:var(--surf);border-top:1px solid var(--border);margin-top:auto}
.footer-inner{max-width:1080px;margin:0 auto;padding:40px 24px 24px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.fc h4{font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--t2);margin-bottom:12px}
.fc p{font-size:.8rem;color:var(--t3);line-height:1.7}
.fc a{display:block;font-size:.8rem;color:var(--t3);text-decoration:none;line-height:2.4;padding:2px 0}
.fc a:hover{color:var(--accent)}
.footer-brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.footer-bottom{max-width:1080px;margin:0 auto;padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--t4);flex-wrap:wrap;gap:8px;padding-bottom:calc(16px + var(--safe-bottom))}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--t4);text-decoration:none;font-size:.75rem}
.footer-links a:hover{color:var(--accent)}
.toast{position:fixed;bottom:24px;left:24px;z-index:9999;padding:14px 24px;border-radius:var(--r);background:#323232;color:#f5f5f5;font-size:.875rem;box-shadow:0 3px 5px -1px rgba(0,0,0,.2),0 6px 10px rgba(0,0,0,.14),0 1px 18px rgba(0,0,0,.12);transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(0,0,.2,1);pointer-events:none;bottom:calc(24px + var(--safe-bottom))}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:860px){.main.shifted{padding-left:0}.search-dropdown{position:fixed;top:var(--hh);left:0;right:0;margin:0;border-radius:0;max-height:50vh}.footer-inner{grid-template-columns:1fr 1fr;gap:28px}.editor-body{padding:10px}.editor-toolbar{gap:0}}
@media(max-width:600px){.header{padding:0 12px}.header-center{display:none}.footer-inner{grid-template-columns:1fr;gap:20px}.footer-bottom{flex-direction:column;text-align:center}.page-header{flex-direction:column;align-items:flex-start}.editor-meta{padding:12px}.editor-area{padding:14px;min-height:200px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="hamburger" aria-label="Menu" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <a href="/index.html" class="logo-wrap">
      <img src="/images/keepos.png" alt="KeepOS" height="32" onerror="this.style.display='none'">
      <span>KeepOS</span>
    </a>
  </div>
  <div class="header-center">
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search your vault..." autocomplete="off">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
  <div class="header-right">
    <div class="avatar" id="avatarBtn" onclick="toggleAvatarMenu()">K</div>
    <div class="avatar-menu" id="avatarMenu">
      <a href="/settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Settings</a>
      <div class="divider"></div>
      <button onclick="lock()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock</button>
    </div>
  </div>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Subjects</div>
    <div id="sidebarSubjects"></div>
  </div>
</aside>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<main class="main" id="mainContent">
  <div class="content">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="page-header" id="pageHeader"><h1 class="page-title">Loading...</h1></div>
    <div class="note-feed" id="noteFeed"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h3>No notes yet</h3>
      <p>Create your first note in this topic.</p>
      <button class="btn-sm btn-sm-primary" onclick="openEditor()">Create Note</button>
    </div>
  </div>
</main>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-header">
    <h3 id="editorTitle">New Note</h3>
    <button class="close-btn" onclick="closeEditor()">&times;</button>
  </div>
  <div class="editor-body">
    <div class="editor-container">
      <div class="editor-meta">
        <input type="text" id="noteTitle" placeholder="Note title" maxlength="200">
        <div class="type-row" id="typeRow">
          <button class="type-chip active" data-type="text" onclick="setNoteType('text')">Text</button>
          <button class="type-chip" data-type="image" onclick="setNoteType('image')">Image</button>
          <button class="type-chip" data-type="link" onclick="setNoteType('link')">Link</button>
          <button class="type-chip" data-type="mixed" onclick="setNoteType('mixed')">Mixed</button>
        </div>
        <div id="linkOnlyField" style="display:none">
          <input type="url" id="noteUrl" placeholder="https://..." style="margin-top:4px">
        </div>
        <div id="imageOnlyField" style="display:none">
          <input type="file" id="noteImageFile" accept="image/*" style="margin-top:4px;font-family:var(--gs);font-size:.85rem">
          <div id="imagePreview" style="margin-top:8px"></div>
        </div>
      </div>
      <div class="editor-toolbar" id="editorToolbar">
        <button class="tb-btn" onclick="execCmd('bold')" title="Bold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6zM6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
        <button class="tb-btn" onclick="execCmd('italic')" title="Italic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
        <button class="tb-btn" onclick="execCmd('underline')" title="Underline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
        <span class="tb-sep"></span>

        <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="Numbered List"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
        <span class="tb-sep"></span>
        <button class="tb-btn" onclick="insertTable()" title="Table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
        <button class="tb-btn" onclick="execCmd('formatBlock','<blockquote>')" title="Quote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
        <button class="tb-btn" onclick="insertCode()" title="Code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
        <span class="tb-sep"></span>
        <button class="tb-btn" onclick="execCmd('subscript')" title="Subscript">x<sub>2</sub></button>
        <button class="tb-btn" onclick="execCmd('superscript')" title="Superscript">x<sup>2</sup></button>
        <span class="tb-sep"></span>
        <button class="tb-btn" onclick="insertLink()" title="Link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        <button class="tb-btn" onclick="triggerImageUpload()" title="Image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        <button class="tb-btn" onclick="insertEquation()" title="Equation">&sum;</button>
        <button class="tb-btn" onclick="insertSmiles()" title="Structure">&#x232C;</button>
        <span class="tb-sep"></span>
        <button class="tb-btn" onclick="toggleHTMLSource()" title="HTML Source" id="htmlSourceBtn">&lt;/&gt;</button>
        <button class="tb-btn" onclick="togglePreview()" title="Preview" id="previewBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <input type="file" id="hiddenImageInput" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
      </div>
      <div class="editor-area" id="editorArea" contenteditable="true"></div>
      <textarea class="html-source-area" id="htmlSourceArea" placeholder="Paste or edit raw HTML here..."></textarea>
      <div class="editor-footer">
        <button class="btn-sm btn-sm-outline" onclick="closeEditor()">Cancel</button>
        <button class="btn-sm btn-sm-primary" id="saveNoteBtn" onclick="saveNote()">Save Note</button>
      </div>
    </div>
  </div>
</div>

    <div class="fc"><h4>Platform</h4><a href="/index.html">Dashboard</a><a href="/search.html">Search</a></div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/smiles-drawer@2.1.7/dist/smiles-drawer.min.js"></script>
<script>
const API = '/api';
const token = localStorage.getItem('keepos_token');
const user = JSON.parse(localStorage.getItem('keepos_user') || 'null');
if (!token || !user) { window.location.href = '/login.html'; }

const urlParams = new URLSearchParams(window.location.search);
const topicId = parseInt(urlParams.get('id'));
if (!topicId) { window.location.href = '/index.html'; }

let topic = null;
let notes = [];
let editingNoteId = null;
let currentNoteType = 'text';
let isPreviewMode = false;
let isHTMLSourceMode = false;

async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    return { ok: res.ok, data, status: res.status };
  } catch(e) { return { ok: false, data: { error: 'Network error.' }, status: 0 }; }
}
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarBackdrop').classList.toggle('open'); document.getElementById('mainContent').classList.toggle('shifted'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarBackdrop').classList.remove('open'); document.getElementById('mainContent').classList.remove('shifted'); }
function toggleAvatarMenu() { document.getElementById('avatarMenu').classList.toggle('open'); }
document.addEventListener('click', function(e) { if (!document.getElementById('avatarBtn').contains(e.target) && !document.getElementById('avatarMenu').contains(e.target)) { document.getElementById('avatarMenu').classList.remove('open'); } });
function lock() { localStorage.removeItem('keepos_token'); localStorage.removeItem('keepos_user'); window.location.href = '/login.html'; }
if (user && user.email) { document.getElementById('avatarBtn').textContent = user.email[0].toUpperCase(); }

async function loadData() {
  const [topicRes, notesRes] = await Promise.all([
    api('GET', `/topics/${topicId}`),
    api('GET', `/topics/${topicId}/notes`)
  ]);
  if (!topicRes.ok) { window.location.href = '/index.html'; return; }
  topic = topicRes.data;
  notes = notesRes.ok ? notesRes.data : [];
  document.getElementById('breadcrumb').innerHTML = `<a href="/index.html">Dashboard</a><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg><a href="/subject.html?id=${topic.subject.id}">${esc(topic.subject.name)}</a><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg><a href="/chapter.html?id=${topic.chapter.id}">${esc(topic.chapter.name)}</a><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg><span style="color:var(--t2);font-weight:500">${esc(topic.name)}</span>`;
  document.getElementById('pageHeader').innerHTML = `<h1 class="page-title">${esc(topic.name)}</h1><div class="page-actions"><button class="btn-sm btn-sm-outline" onclick="editTopic()">Edit</button><button class="btn-sm btn-sm-danger" onclick="deleteTopic()">Delete</button><button class="btn-sm btn-sm-primary" onclick="openEditor()">New Note</button></div>`;
  renderNotes();
  loadSidebarSubjects();
}

async function loadSidebarSubjects() {
  const { ok, data } = await api('GET', '/subjects');
  if (!ok) return;
  document.getElementById('sidebarSubjects').innerHTML = data.map(s =>
    `<a href="/subject.html?id=${s.id}" class="sidebar-subject"><span class="dot" style="background:${esc(s.color)}"></span>${esc(s.name)}</a>`
  ).join('');
}

function renderNotes() {
  const feed = document.getElementById('noteFeed');
  const empty = document.getElementById('emptyState');
  if (notes.length === 0) { feed.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  
  feed.innerHTML = notes.map(n => {
    let bodyHtml = '';
    if (n.type === 'link') {
      bodyHtml = `<div class="note-link-card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.url)}</a></div>`;
    } else if (n.type === 'image') {
      bodyHtml = n.image_url ? `<img src="${esc(n.image_url)}" alt="${esc(n.title)}" loading="lazy">` : '<p style="color:var(--t4)">No image</p>';
    } else {
      bodyHtml = n.content_html || '';
    }
    
    const isLong = (n.type === 'text' || n.type === 'mixed') && bodyHtml.length > 300;
    
    return `<div class="note-card" id="note-${n.id}" onclick="expandNote(${n.id})">
      <div class="note-actions">
        <button class="icon-btn-sm" onclick="event.stopPropagation();moveNote(${n.id},'up')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg></button>
        <button class="icon-btn-sm" onclick="event.stopPropagation();moveNote(${n.id},'down')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
        <button class="icon-btn-sm" onclick="event.stopPropagation();openEditor(${n.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="icon-btn-sm" onclick="event.stopPropagation();deleteNote(${n.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div>
      <div class="note-header"><span class="note-title">${esc(n.title)}</span><span class="note-type-badge type-${n.type}">${n.type}</span></div>
      <div class="note-body">${bodyHtml}</div>
      ${isLong ? '<span class="read-more">Read more...</span>' : ''}
    </div>`;
  }).join('');
  
  if (typeof renderMathInElement !== 'undefined') {
    renderMathInElement(document.getElementById('noteFeed'), { delimiters: [{left: '$', right: '$', display: false}] });
  }
  initSmiles();
}

function expandNote(id) {
  const card = document.getElementById('note-' + id);
  if (!card) return;
  
  // Close other expanded cards
  document.querySelectorAll('.note-card.expanded').forEach(c => {
    if (c.id !== 'note-' + id) c.classList.remove('expanded');
  });
  
  // Toggle
  card.classList.toggle('expanded');
  
  // Re-render KaTeX
  if (card.classList.contains('expanded') && typeof renderMathInElement !== 'undefined') {
    setTimeout(() => {
      renderMathInElement(card.querySelector('.note-body'), { delimiters: [{left: '$', right: '$', display: false}] });
    }, 200);
  }
}

function initSmiles() {
  document.querySelectorAll('.smiles-placeholder').forEach(el => {
    const smiles = el.getAttribute('data-smiles');
    if (smiles && typeof SmilesDrawer !== 'undefined') {
      try {
        const drawer = new SmilesDrawer.Drawer({ width: 200, height: 200 });
        SmilesDrawer.parse(smiles, function(tree) { drawer.draw(tree, el, 'light', false); });
      } catch(e) {}
    }
  });
}

// ==================== EDITOR ====================

function openEditor(id) {
  editingNoteId = id || null;
  currentNoteType = 'text';
  isPreviewMode = false;
  isHTMLSourceMode = false;
  document.getElementById('editorTitle').textContent = id ? 'Edit Note' : 'New Note';
  document.getElementById('noteTitle').value = '';
  document.getElementById('editorArea').innerHTML = '';
  document.getElementById('htmlSourceArea').value = '';
  document.getElementById('noteUrl').value = '';
  document.getElementById('imagePreview').innerHTML = '';
  document.getElementById('noteImageFile').value = '';
  if (id) {
    const n = notes.find(x => x.id === id);
    if (n) {
      document.getElementById('noteTitle').value = n.title;
      currentNoteType = n.type;
      document.getElementById('editorArea').innerHTML = n.content_html || '';
      document.getElementById('noteUrl').value = n.url || '';
      if (n.image_url) {
        document.getElementById('imagePreview').innerHTML = `<img src="${esc(n.image_url)}" style="max-width:200px;border-radius:var(--r)" alt="Preview">`;
      }
    }
  }
  setNoteTypeUI(currentNoteType);
  resetEditorModes();
  document.getElementById('editorOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('noteTitle').focus(), 100);
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('open');
  document.body.style.overflow = '';
  editingNoteId = null;
  isPreviewMode = false;
  isHTMLSourceMode = false;
}

function resetEditorModes() {
  isPreviewMode = false;
  isHTMLSourceMode = false;
  const editorArea = document.getElementById('editorArea');
  const htmlSourceArea = document.getElementById('htmlSourceArea');
  const previewBtn = document.getElementById('previewBtn');
  const htmlSourceBtn = document.getElementById('htmlSourceBtn');
  const toolbar = document.getElementById('editorToolbar');
  
  editorArea.style.display = 'block';
  editorArea.contentEditable = 'true';
  htmlSourceArea.style.display = 'none';
  htmlSourceArea.classList.remove('show');
  toolbar.style.display = (currentNoteType === 'link' || currentNoteType === 'image') ? 'none' : 'flex';
  
  previewBtn.classList.remove('active-btn');
  previewBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  previewBtn.title = 'Preview';
  previewBtn.style.display = '';
  
  htmlSourceBtn.classList.remove('active-btn');
  htmlSourceBtn.title = 'HTML Source';
  htmlSourceBtn.style.display = '';
}

function togglePreview() {
  if (isHTMLSourceMode) toggleHTMLSource();
  
  const editorArea = document.getElementById('editorArea');
  const previewBtn = document.getElementById('previewBtn');
  const toolbar = document.getElementById('editorToolbar');
  
  isPreviewMode = !isPreviewMode;
  
  if (isPreviewMode) {
    editorArea.contentEditable = 'false';
    editorArea.style.background = 'var(--surf)';
    editorArea.style.border = '1px solid var(--border)';
    editorArea.style.borderRadius = 'var(--r)';
    editorArea.style.padding = '20px';
    toolbar.style.display = 'none';
    previewBtn.classList.add('active-btn');
    previewBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    previewBtn.title = 'Edit';
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(editorArea, { delimiters: [{left: '$', right: '$', display: false}] });
    }
  } else {
    editorArea.contentEditable = 'true';
    editorArea.style.background = '';
    editorArea.style.border = '';
    editorArea.style.borderRadius = '';
    editorArea.style.padding = '';
    toolbar.style.display = 'flex';
    previewBtn.classList.remove('active-btn');
    previewBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    previewBtn.title = 'Preview';
  }
}

function toggleHTMLSource() {
  if (isPreviewMode) togglePreview();
  
  const editorArea = document.getElementById('editorArea');
  const htmlSourceArea = document.getElementById('htmlSourceArea');
  const htmlSourceBtn = document.getElementById('htmlSourceBtn');
  const previewBtn = document.getElementById('previewBtn');
  const toolbar = document.getElementById('editorToolbar');
  
  isHTMLSourceMode = !isHTMLSourceMode;
  
  if (isHTMLSourceMode) {
    htmlSourceArea.value = editorArea.innerHTML;
    editorArea.style.display = 'none';
    htmlSourceArea.style.display = 'block';
    htmlSourceArea.classList.add('show');
    htmlSourceBtn.classList.add('active-btn');
    toolbar.style.display = 'none';
    previewBtn.style.display = 'none';
  } else {
    editorArea.innerHTML = htmlSourceArea.value;
    editorArea.style.display = 'block';
    htmlSourceArea.style.display = 'none';
    htmlSourceArea.classList.remove('show');
    htmlSourceBtn.classList.remove('active-btn');
    toolbar.style.display = 'flex';
    previewBtn.style.display = '';
  }
}

function setNoteType(type) { currentNoteType = type; setNoteTypeUI(type); }

function setNoteTypeUI(type) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.type-chip[data-type="${type}"]`)?.classList.add('active');
  document.getElementById('linkOnlyField').style.display = type === 'link' ? 'block' : 'none';
  document.getElementById('imageOnlyField').style.display = type === 'image' ? 'block' : 'none';
  const toolbar = document.getElementById('editorToolbar');
  const editorArea = document.getElementById('editorArea');
  const previewBtn = document.getElementById('previewBtn');
  const htmlSourceBtn = document.getElementById('htmlSourceBtn');
  if (type === 'link' || type === 'image') {
    toolbar.style.display = 'none';
    editorArea.style.display = 'none';
    previewBtn.style.display = 'none';
    htmlSourceBtn.style.display = 'none';
  } else {
    if (!isPreviewMode && !isHTMLSourceMode) toolbar.style.display = 'flex';
    if (!isHTMLSourceMode) editorArea.style.display = 'block';
    previewBtn.style.display = '';
    htmlSourceBtn.style.display = '';
  }
}

function execCmd(command, value) { document.execCommand(command, false, value || null); document.getElementById('editorArea').focus(); }

function execHeading(level) {
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    const container = range.commonAncestorContainer;
    let block = container.nodeType === 3 ? container.parentElement : container;
    while (block && !['P','DIV','H2','H3','BLOCKQUOTE','PRE'].includes(block.tagName) && block !== document.getElementById('editorArea')) {
      block = block.parentElement;
    }
    if (block && block !== document.getElementById('editorArea')) {
      const newEl = document.createElement(level);
      newEl.innerHTML = block.innerHTML;
      block.parentNode.replaceChild(newEl, block);
    }
  }
  document.getElementById('editorArea').focus();
}

function insertTable() { document.execCommand('insertHTML', false, '<table><tbody><tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr><tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr><tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr></tbody></table><p><br></p>'); }
function insertCode() { const sel = window.getSelection(); const text = sel.toString().trim(); document.execCommand('insertHTML', false, text ? `<pre><code>${esc(text)}</code></pre>` : '<pre><code>// code</code></pre>'); }
function insertLink() { const url = prompt('Enter URL:', 'https://'); if (url) { document.execCommand('createLink', false, url); } }
function triggerImageUpload() { document.getElementById('hiddenImageInput').click(); }

async function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { showToast('Image too large. Max 10MB.'); return; }
  showToast('Uploading...');
  const reader = new FileReader();
  reader.onload = async function(e) {
    const res = await api('POST', '/upload/image', { imageBase64: e.target.result });
    if (!res.ok) { showToast(res.data.error || 'Upload failed.'); return; }
    document.execCommand('insertHTML', false, `<img src="${esc(res.data.url)}" alt="Image">`);
    showToast('Image uploaded.');
  };
  reader.readAsDataURL(file);
}

function insertEquation() { const eq = prompt('LaTeX:', 'E=mc^2'); if (eq) document.execCommand('insertHTML', false, `<span class="eq">$${esc(eq)}$</span>`); }

function insertSmiles() {
  const s = prompt('SMILES:', 'CCO');
  if (s) {
    const id = 'smi-'+Date.now();
    document.execCommand('insertHTML', false, `<span class="smiles-placeholder" id="${id}" data-smiles="${esc(s)}" style="display:inline-block;width:200px;height:200px;border:1px solid var(--border);border-radius:var(--r)"></span>`);
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el && typeof SmilesDrawer !== 'undefined') {
        try { const d = new SmilesDrawer.Drawer({width:200,height:200}); SmilesDrawer.parse(s, t=>d.draw(t,el,'light',false)); } catch(e) {}
      }
    }, 100);
  }
}

async function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  if (!title) { showToast('Enter a title.'); return; }
  if (isHTMLSourceMode) { document.getElementById('editorArea').innerHTML = document.getElementById('htmlSourceArea').value; }
  
  const type = currentNoteType;
  let content_html = '', url = '', image_url = '';
  if (type === 'text' || type === 'mixed') content_html = document.getElementById('editorArea').innerHTML;
  if (type === 'link') { url = document.getElementById('noteUrl').value.trim(); if (!url) { showToast('Enter URL.'); return; } }
  if (type === 'image') {
    const pv = document.querySelector('#imagePreview img');
    if (pv) { image_url = pv.getAttribute('src'); }
    else {
      const f = document.getElementById('noteImageFile').files[0];
      if (!f) { showToast('Select an image.'); return; }
      showToast('Uploading...');
      const rdr = new FileReader();
      rdr.onload = async function(e) { const r = await api('POST','/upload/image',{imageBase64:e.target.result}); if(!r.ok){showToast('Upload failed.');return;} await doSave({topic_id:topicId,title,type,content_html,url,image_url:r.data.url}); };
      rdr.readAsDataURL(f); return;
    }
  }
  await doSave({ topic_id: topicId, title, type, content_html, url, image_url });
}

async function doSave(body) {
  const btn = document.getElementById('saveNoteBtn'); btn.disabled = true; btn.textContent = 'Saving...';
  const res = editingNoteId ? await api('PUT', `/notes/${editingNoteId}`, body) : await api('POST', '/notes', body);
  btn.disabled = false; btn.textContent = 'Save Note';
  if (!res.ok) { showToast(res.data.error || 'Failed.'); return; }
  closeEditor(); showToast(editingNoteId ? 'Updated.' : 'Created.'); loadData();
}

async function moveNote(id, dir) { await api('POST', `/notes/${id}/move`, { direction: dir }); loadData(); }
async function deleteNote(id) { if (!confirm('Delete this note?')) return; await api('DELETE', `/notes/${id}`); showToast('Deleted.'); loadData(); }
function editTopic() { const n = prompt('Edit topic:', topic.name); if (n && n.trim()) { api('PUT', `/topics/${topicId}`, { name: n.trim() }).then(() => loadData()); } }
async function deleteTopic() { if (!confirm(`Delete "${topic.name}"?`)) return; const r = await api('DELETE', `/topics/${topicId}`); if (r.ok) window.location.href = `/chapter.html?id=${topic.chapter.id}`; }

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeEditor(); });

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout); const q = this.value.trim();
  if (q.length < 2) { document.getElementById('searchDropdown').classList.remove('open'); return; }
  searchTimeout = setTimeout(() => doSearch(q), 300);
});
async function doSearch(q) {
  const dd = document.getElementById('searchDropdown');
  const { ok, data } = await api('GET', `/search?q=${encodeURIComponent(q)}`);
  if (!ok) return;
  let h = '';
  if (data.subjects.length) { h += '<div class="section-label">Subjects</div>'; h += data.subjects.map(s => `<a href="/subject.html?id=${s.id}" class="result-item">${esc(s.name)}</a>`).join(''); }
  if (data.notes.length) { h += '<div class="section-label">Notes</div>'; h += data.notes.map(n => `<a href="/topic.html?id=${n.topic.id}" class="result-item">${esc(n.title)}</a>`).join(''); }
  dd.innerHTML = h || '<div style="padding:16px;color:var(--t4);font-size:.85rem">No results</div>';
  dd.classList.add('open');
}
document.addEventListener('click', function(e) { if (!document.getElementById('searchInput').contains(e.target) && !document.getElementById('searchDropdown').contains(e.target)) { document.getElementById('searchDropdown').classList.remove('open'); } });

loadData();
</script>
</body>
</html>
