<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KeepOS — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
:root{
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --accent:#00d4aa;--accent-h:#00b894;--red:#d93025;--red-bg:#fce8e6;
  --gs:'Plus Jakarta Sans',system-ui,sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
  --r:4px;--rl:12px;--tr:.2s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body{
  font-family:var(--gs);background:var(--bg);color:var(--t2);
  -webkit-font-smoothing:antialiased;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;-webkit-tap-highlight-color:transparent;
}
.login-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:48px 40px;width:100%;max-width:420px;box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15);
}
.logo-row{
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;
}
.logo-row img{width:36px;height:36px;border-radius:50%}
.logo-row span{font-family:var(--serif);font-size:1.5rem;font-weight:600;color:var(--t1)}
.card-subtitle{text-align:center;color:var(--t3);font-size:.875rem;margin-bottom:32px}
.field{margin-bottom:18px}
.field-label{display:block;font-size:.75rem;font-weight:600;color:var(--t3);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.field-input{
  width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);
  font-family:var(--gs);font-size:.95rem;color:var(--t1);background:var(--surf);
  outline:none;transition:border var(--tr);min-height:44px;
}
.field-input:hover{border-color:var(--t3)}
.field-input:focus{border:2px solid var(--accent);padding:11px 13px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:.8rem;margin-bottom:16px;display:none}
.alert-e{display:block;background:var(--red-bg);color:var(--red);border:1px solid rgba(217,48,37,.2)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 24px;font-family:var(--gs);font-size:.9rem;font-weight:600;
  border:none;border-radius:var(--r);cursor:pointer;transition:all var(--tr);
  width:100%;min-height:48px;letter-spacing:.3px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);box-shadow:0 1px 2px rgba(0,180,140,.3),0 2px 6px rgba(0,180,140,.15)}
.btn-primary:disabled{background:#c4c7cc;color:var(--t4);cursor:not-allowed;box-shadow:none}
.spinner-inline{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-note{text-align:center;margin-top:24px;font-size:.8rem;color:var(--t4)}
.footer-note span{font-family:var(--mono);font-size:.72rem;background:var(--hov);padding:3px 8px;border-radius:100px}
@media(max-width:480px){
  .login-card{padding:32px 24px}
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo-row">
    <img src="/images/keepos.png" alt="KeepOS" height="36" onerror="this.style.display='none'">
    <span>KeepOS</span>
  </div>
  <p class="card-subtitle">Sign in to your knowledge vault</p>

  <div class="alert" id="loginAlert"></div>

  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label class="field-label" for="email">Email</label>
      <input type="email" class="field-input" id="email" placeholder="mdalamin.cnct@gmail.com" required autofocus>
    </div>
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input type="password" class="field-input" id="password" placeholder="Your password" required>
    </div>
    <div class="field">
      <label class="field-label" for="masterKey">Master Key</label>
      <input type="password" class="field-input" id="masterKey" placeholder="Your master key phrase" required>
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">
      <span id="btnText">Sign in</span>
      <span class="spinner-inline" id="spinner"></span>
    </button>
  </form>

  <p class="footer-note">First login sets your master key &nbsp;<span>keep it safe</span></p>
</div>

<script>
const API = '/api';

function showAlert(msg) {
  const el = document.getElementById('loginAlert');
  el.textContent = msg;
  el.className = 'alert alert-e';
}

function clearAlert() {
  const el = document.getElementById('loginAlert');
  el.className = 'alert';
  el.textContent = '';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearAlert();

  if (!navigator.onLine) { showAlert('No internet connection.'); return; }

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const masterKey = document.getElementById('masterKey').value;

  if (!email || !password || !masterKey) { showAlert('All fields are required.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'inline-block';
  document.getElementById('btnText').style.display = 'none';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, masterKey })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error || 'Login failed.'); resetBtn(); return; }

    localStorage.setItem('keepos_token', data.token);
    localStorage.setItem('keepos_user', JSON.stringify(data.user));
    window.location.href = '/index.html';
  } catch(e) {
    showAlert('Network error. Please try again.');
    resetBtn();
  }

  function resetBtn() {
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('btnText').style.display = 'inline';
  }
});
</script>
</body>
</html>
